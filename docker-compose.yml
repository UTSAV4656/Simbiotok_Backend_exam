version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: college_mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_DATABASE: 'college_db'
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

volumes:
  mysql_data:
